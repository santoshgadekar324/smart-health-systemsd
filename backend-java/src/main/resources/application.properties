# ============================================================
# Smart Health System - Application Configuration
# ============================================================

spring.application.name=smart-health-backend

# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smart_health_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── JWT ───────────────────────────────────────────────────
jwt.secret=SmartHealthSecretKey2024_ChangeThisInProduction_MustBe256BitsLong!
jwt.expiration=86400000

# ── Python AI Service ─────────────────────────────────────
ai.service.url=http://localhost:5000

# ── CORS ──────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,https://yourfrontend.netlify.app

# ── Logging ───────────────────────────────────────────────
logging.level.com.smarthealth=INFO
logging.level.org.springframework.security=WARN
