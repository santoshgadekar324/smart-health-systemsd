<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — SmartHealth</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
<div class="auth-split">
  <div class="auth-left d-none d-lg-flex">
    <div class="auth-left-content">
      <a href="index.html" class="sh-brand mb-5"><span class="brand-icon">⚕</span> SmartHealth</a>
      <h2>Start your health journey today.</h2>
      <p class="mt-3 opacity-75">Register as a patient and get instant AI health insights.</p>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-form-wrap">
      <h3 class="auth-form-title">Create Account</h3>
      <p class="auth-form-sub">Join SmartHealth — it's free</p>
      <div id="alertBox" class="alert d-none"></div>
      <form id="registerForm" novalidate>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Full Name</label>
            <div class="input-group sh-input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" id="fullName" class="form-control" placeholder="John Doe" required />
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Email Address</label>
            <div class="input-group sh-input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="email" class="form-control" placeholder="you@example.com" required />
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="tel" id="phone" class="form-control sh-input" placeholder="+91 9876543210" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Gender</label>
            <select id="gender" class="form-select sh-input">
              <option value="">Select</option>
              <option value="MALE">Male</option>
              <option value="FEMALE">Female</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Date of Birth</label>
            <input type="date" id="dob" class="form-control sh-input" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Role</label>
            <select id="role" class="form-select sh-input">
              <option value="PATIENT">Patient</option>
              <option value="DOCTOR">Doctor</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Password</label>
            <div class="input-group sh-input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required minlength="8" />
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Confirm Password</label>
            <div class="input-group sh-input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" id="confirmPwd" class="form-control" placeholder="Repeat password" required />
            </div>
          </div>
          <div class="col-12">
            <button type="submit" class="btn sh-btn-primary w-100 btn-lg" id="regBtn">
              <span class="btn-text">Create Account</span>
              <span class="spinner-border spinner-border-sm d-none" id="regSpinner"></span>
            </button>
          </div>
        </div>
      </form>
      <p class="text-center mt-4">Already have an account? <a href="login.html" class="sh-link">Login</a></p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pwd = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPwd').value;
    if (pwd !== confirm) { showAlert('Passwords do not match.', 'danger'); return; }

    const btn = document.getElementById('regBtn');
    const spinner = document.getElementById('regSpinner');
    btn.disabled = true;
    spinner.classList.remove('d-none');

    const payload = {
      fullName: document.getElementById('fullName').value.trim(),
      email:    document.getElementById('email').value.trim(),
      password: pwd,
      phone:    document.getElementById('phone').value.trim(),
      gender:   document.getElementById('gender').value || null,
      dateOfBirth: document.getElementById('dob').value || null,
      role:     document.getElementById('role').value,
    };

    try {
      const res = await API.register(payload);
      if (res.success) {
        showAlert('Account created! Redirecting…', 'success');
        setTimeout(() => {
          const role = res.data.role;
          window.location.href = role === 'PATIENT' ? 'patient-dashboard.html'
                               : role === 'DOCTOR'  ? 'doctor-dashboard.html'
                               : 'admin-dashboard.html';
        }, 800);
      } else {
        showAlert(res.message || 'Registration failed.', 'danger');
      }
    } catch (err) {
      showAlert('Network error. Is the backend running?', 'danger');
    } finally {
      btn.disabled = false;
      spinner.classList.add('d-none');
    }
  });

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.textContent = msg;
    box.classList.remove('d-none');
  }
</script>
</body>
</html>
