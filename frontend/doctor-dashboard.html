<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Dashboard — SmartHealth</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-page">
<div class="sh-sidebar" id="sidebar">
  <div class="sidebar-brand"><span class="brand-icon">⚕</span> SmartHealth</div>
  <nav class="sidebar-nav">
    <a href="#" class="sidebar-link active" data-tab="overview"><i class="bi bi-grid-1x2"></i> Overview</a>
    <a href="#" class="sidebar-link" data-tab="appointments"><i class="bi bi-calendar3"></i> Appointments</a>
    <a href="#" class="sidebar-link" data-tab="profile"><i class="bi bi-person-circle"></i> My Profile</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn btn-sm sh-logout" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
  </div>
</div>
<div class="sh-main">
  <div class="sh-topbar">
    <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="topbar-title" id="topbarTitle">Doctor Dashboard</div>
    <div class="topbar-user"><div class="user-avatar" id="userAvatar">D</div><span id="userName">Doctor</span></div>
  </div>
  <div class="dash-content p-4">

    <!-- Overview -->
    <div id="tab-overview" class="dash-tab active">
      <div class="row g-4 mb-4">
        <div class="col-sm-6 col-xl-3"><div class="stat-card sc-blue"><div class="sc-icon"><i class="bi bi-calendar-check"></i></div><div class="sc-body"><div class="sc-val" id="statTotal">0</div><div class="sc-label">Total Appointments</div></div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="stat-card sc-amber"><div class="sc-icon"><i class="bi bi-clock"></i></div><div class="sc-body"><div class="sc-val" id="statPending">0</div><div class="sc-label">Pending</div></div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="stat-card sc-green"><div class="sc-icon"><i class="bi bi-check2-circle"></i></div><div class="sc-body"><div class="sc-val" id="statApproved">0</div><div class="sc-label">Approved</div></div></div></div>
        <div class="col-sm-6 col-xl-3"><div class="stat-card sc-rose"><div class="sc-icon"><i class="bi bi-x-circle"></i></div><div class="sc-body"><div class="sc-val" id="statRejected">0</div><div class="sc-label">Rejected</div></div></div></div>
      </div>
      <h6 class="section-label">Today's Appointments</h6>
      <div id="todayAppts" class="appt-list"></div>
    </div>

    <!-- Appointments -->
    <div id="tab-appointments" class="dash-tab">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="section-label mb-0">All Appointments</h6>
        <select id="statusFilter" class="form-select sh-input w-auto" onchange="filterAppointments()">
          <option value="">All Status</option>
          <option value="PENDING">Pending</option>
          <option value="APPROVED">Approved</option>
          <option value="REJECTED">Rejected</option>
          <option value="COMPLETED">Completed</option>
        </select>
      </div>
      <div id="allAppts" class="appt-list"></div>
    </div>

    <!-- Profile -->
    <div id="tab-profile" class="dash-tab">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="sh-card">
            <div class="sh-card-header"><i class="bi bi-person-circle me-2"></i> Doctor Profile</div>
            <div class="sh-card-body">
              <form id="profileForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Specialization</label>
                    <input type="text" id="pSpecialization" class="form-control sh-input" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">License Number</label>
                    <input type="text" id="pLicense" class="form-control sh-input" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Years of Experience</label>
                    <input type="number" id="pYears" class="form-control sh-input" min="0" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Hospital Name</label>
                    <input type="text" id="pHospital" class="form-control sh-input" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Consultation Fee (₹)</label>
                    <input type="number" id="pFee" class="form-control sh-input" step="0.01" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Available Days</label>
                    <input type="text" id="pDays" class="form-control sh-input" placeholder="MON,TUE,WED" />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Bio</label>
                    <textarea id="pBio" class="form-control sh-input" rows="3"></textarea>
                  </div>
                  <div class="col-12">
                    <div id="profileAlert" class="alert d-none"></div>
                    <button type="button" class="btn sh-btn-primary w-100" onclick="saveProfile()">
                      <i class="bi bi-save me-2"></i> Save Profile
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="doctor.js"></script>
</body>
</html>
